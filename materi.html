<body>

  <div class="container mt-4">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const dataGuru = [
  {id:1,nama:"Pak Budi Santoso",mapel:"Matematika",rating:4.9,jumlahSiswa:234,harga:"50k/sesi",foto:"https://i.pravatar.cc/150?img=11",online:true,jadwal:"Senin & Kamis 19.00"},
  {id:2,nama:"Bu Sari Dewi",mapel:"Fisika",rating:4.8,jumlahSiswa:189,harga:"45k/sesi",foto:"https://i.pravatar.cc/150?img=5",online:false,jadwal:"Selasa & Jumat 20.00"},
  {id:3,nama:"Kak Andi Pratama",mapel:"B.Inggris",rating:5.0,jumlahSiswa:301,harga:"60k/sesi",foto:"https://i.pravatar.cc/150?img=12",online:true,jadwal:"Rabu 19.30"},
  {id:4,nama:"Bu Rina Melati",mapel:"Kimia",rating:4.7,jumlahSiswa:156,harga:"45k/sesi",foto:"https://i.pravatar.cc/150?img=9",online:true,jadwal:"Kamis & Sabtu 18.00"},
  {id:5,nama:"Pak Dedi Gunawan",mapel:"Matematika",rating:4.6,jumlahSiswa:201,harga:"40k/sesi",foto:"https://i.pravatar.cc/150?img=13",online:false,jadwal:"Minggu 16.00"},
  {id:6,nama:"Kak Lina Putri",mapel:"Biologi",rating:4.9,jumlahSiswa:278,harga:"55k/sesi",foto:"https://i.pravatar.cc/150?img=1",online:true,jadwal:"Senin & Rabu 20.00"}
];

function renderBintang(rating){
  let bintang = '';
  for(let i=1; i<=5; i++){
    if(i <= Math.floor(rating)) bintang += '<i class="bi bi-star-fill"></i>';
    else if(i - 0.5 <= rating) bintang += '<i class="bi bi-star-half"></i>';
    else bintang += '<i class="bi bi-star"></i>';
  }
  return bintang;
}

function tampilkanGuru(list = dataGuru){
  const container = document.getElementById('listGuru');
  if(!container) return;
  container.innerHTML = '';

  if(list.length === 0){
    container.innerHTML = '<p class="text-center text-muted mt-4">Guru tidak ditemukan</p>';
    return;
  }

  list.forEach(guru => {
    container.innerHTML += `
      <div class="guru-card">
        <div class="d-flex align-items-start mb-2">
          <img src="${guru.foto}" class="guru-foto me-3" alt="${guru.nama}">
          <div class="flex-grow-1">
            <p class="guru-nama">${guru.nama} ${guru.online? '<span class="badge-online"></span>' : ''}</p>
            <span class="guru-mapel">${guru.mapel}</span>
            <div class="guru-rating mt-1">
              ${renderBintang(guru.rating)} <b>${guru.rating}</b> <span class="text-muted" style="font-size:12px">(${guru.jumlahSiswa} siswa)</span>
            </div>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-2">
          <div>
            <div class="guru-harga">${guru.harga}</div>
            <div class="text-muted" style="font-size:12px"><i class="bi bi-calendar"></i> ${guru.jadwal}</div>
          </div>
          <button class="btn btn-sm btn-pilih-guru" onclick="pilihGuru(${guru.id})" style="width:auto;padding:8px 20px">
            Pilih Guru
          </button>
        </div>
      </div>
    `;
  });
}

function filterGuru(){
  const mapel = document.getElementById('filterMapel').value;
  if(mapel === 'all') tampilkanGuru(dataGuru);
  else tampilkanGuru(dataGuru.filter(g => g.mapel === mapel));
}

function pilihGuru(id){
  const guru = dataGuru.find(g => g.id === id);
  if(confirm(`Mau les ${guru.mapel} sama ${guru.nama}?\nJadwal: ${guru.jadwal}\nHarga: ${guru.harga}`)){
    alert(`Berhasil pilih ${guru.nama}! Silakan lanjut ke pembayaran.`);
  }
}

document.addEventListener('DOMContentLoaded', function() {
  tampilkanGuru();
});
</script>
