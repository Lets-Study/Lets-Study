<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login - LS Academy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#004AAD,#0056d6); min-height: 100vh; display: flex; align-items: center; font-family: 'Segoe UI', Arial, sans-serif; }
    .card { border: none; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .btn-primary { background: #004AAD; border: none; border-radius: 12px; font-weight: 600; padding: 12px; }
    .btn-primary:hover { background: #003a8a; }
    .form-control { border-radius: 12px; padding: 12px; border: 2px solid #e0e7ff; }
    .form-control:focus { border-color: #004AAD; box-shadow: 0 0.2rem rgba(0,74,173,0.15); }
    .toggle-eye { position:absolute; right:15px; top:50%; transform:translateY(-50%); cursor:pointer; color:#6b7280; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card p-4">
          <div class="text-center mb-4">
            <img src="icon-192.png" width="70" style="border-radius:16px">
            <h3 class="fw-bold mt-3" style="color:#004AAD">LS Academy</h3>
            <p class="text-muted" id="formTitle">Masuk ke akun kamu</p>
          </div>
          <form id="loginForm">
            <div class="mb-3"><input type="email" class="form-control" id="loginEmail" placeholder="Email" required></div>
            <div class="mb-3 position-relative">
                <input type="password" class="form-control pe-5" id="loginPassword" placeholder="Password" required>
                <span class="toggle-eye" onclick="togglePass('loginPassword', 'eyeLogin')">
                    <svg id="eyeLogin" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </span>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">
              <span id="btnLoginText">Masuk</span>
              <span id="btnLoginLoading" style="display:none"><span class="spinner-border spinner-border-sm"></span> Loading...</span>
            </button>
            <p class="text-center text-muted">Belum punya akun? <a href="#" onclick="showRegister()" style="color:#004AAD;font-weight:600">Daftar</a></p>
          </form>
          <form id="registerForm" style="display:none">
            <div class="mb-3"><input type="text" class="form-control" id="regNama" placeholder="Nama Lengkap" required></div>
            <div class="mb-3"><input type="email" class="form-control" id="regEmail" placeholder="Email" required></div>
            <div class="mb-3 position-relative">
                <input type="password" class="form-control pe-5" id="regPassword" placeholder="Password min 6 karakter" required minlength="6">
                <span class="toggle-eye" onclick="togglePass('regPassword', 'eyeReg')">
                    <svg id="eyeReg" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </span>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">
              <span id="btnRegText">Daftar Sekarang</span>
              <span id="btnRegLoading" style="display:none"><span class="spinner-border spinner-border-sm"></span> Loading...</span>
            </button>
            <p class="text-center text-muted">Udah punya akun? <a href="#" onclick="showLogin()" style="color:#004AAD;font-weight:600">Masuk</a></p>
          </form>
          <div class="alert alert-danger mt-3" id="errorMsg" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  const supabaseUrl = 'https://rdziigwttjhnrmiutxbp.supabase.co'
  const supabaseKey = 'sb_publishable_YOV4qY3s5M7W4u9vCcApnQ_-mdd6xXA'
  const supabase = createClient(supabaseUrl, supabaseKey)

  // HAPUS AUTO-REDIRECT BIAR GAK PING-PONG
  // const { data: { user } } = await supabase.auth.getUser()
  // if (user) window.location.replace("beranda.html")

  function showError(msg) {
    const el = document.getElementById('errorMsg')
    el.textContent = msg
    el.style.display = 'block'
    setTimeout(() => el.style.display = 'none', 4000)
  }

  window.showRegister = () => {
    document.getElementById('loginForm').style.display = 'none'
    document.getElementById('registerForm').style.display = 'block'
    document.getElementById('formTitle').textContent = 'Buat akun baru'
  }

  window.showLogin = () => {
    document.getElementById('registerForm').style.display = 'none'
    document.getElementById('loginForm').style.display = 'block'
    document.getElementById('formTitle').textContent = 'Masuk ke akun kamu'
  }

  window.togglePass = (inputId, eyeId) => {
    const input = document.getElementById(inputId);
    const eye = document.getElementById(eyeId);
    if (input.type === "password") {
        input.type = "text";
        eye.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 0 01-4.132 5.411m0 0L21 21" />`;
    } else {
        input.type = "password";
        eye.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
    }
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault()
    document.getElementById('btnLoginText').style.display = 'none'
    document.getElementById('btnLoginLoading').style.display = 'inline'
    const { error } = await supabase.auth.signInWithPassword({
      email: document.getElementById('loginEmail').value,
      password: document.getElementById('loginPassword').value
    })
    if (error) {
      showError(error.message)
      document.getElementById('btnLoginText').style.display = 'inline'
      document.getElementById('btnLoginLoading').style.display = 'none'
    } else {
      // Kasih delay 300ms biar session kesimpen dulu
      setTimeout(() => {
        window.location.href = "beranda.html"
      }, 300)
    }
  })

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault()
    document.getElementById('btnRegText').style.display = 'none'
    document.getElementById('btnRegLoading').style.display = 'inline'
    const email = document.getElementById('regEmail').value
    const password = document.getElementById('regPassword').value
    const nama = document.getElementById('regNama').value
    const { data, error } = await supabase.auth.signUp({ email, password })
    if (error) {
      showError(error.message)
    } else if (data.user) {
      await supabase.from('users').insert({ id: data.user.id, email: email, nama: nama })
      setTimeout(() => {
        window.location.href = "beranda.html"
      }, 300)
    }
    document.getElementById('btnRegText').style.display = 'inline'
    document.getElementById('btnRegLoading').style.display = 'none'
  })
</script>
</body>
</html>
