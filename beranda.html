<!DOCTYPE html>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAT4N5L04XLIktGq5mYvEqv7SiDE6uPS08",
    authDomain: "ls-academy-27d8c.firebaseapp.com",
    projectId: "ls-academy-27d8c",
    storageBucket: "ls-academy-27d8c.firebasestorage.app",
    messagingSenderId: "188990388320",
    appId: "1:188990388320:web:96a2c34af41c8b1632ab05"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
    } else {
      // AMBIL NAMA USER DINAMIS DARI FIREBASE
      const namaUser = user.displayName || user.email.split('@')[0] || 'Murid';
      document.getElementById('salamUser').innerText = `Selamat datang, ${namaUser}!`;
    }
  });

  window.logout = function() {
    signOut(auth).then(() => {
      window.location.href = "login.html";
    });
  }
  </script>
