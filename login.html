<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LS Academy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(180deg, #0099FF 0%, #00BFFF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', Arial, sans-serif;
      padding: 20px;
    }
    
    .login-box {
      width: 100%;
      max-width: 320px;
      text-align: center;
      animation: slideUp 0.5s ease-out;
    }
    
    .logo {
      color: #FFD700;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 5px;
    }
    
    .tagline {
      color: #FFD700;
      font-size: 14px;
      font-weight: 400;
      margin-bottom: 40px;
      opacity: 0.95;
    }
    
    input {
      width: 100%;
      padding: 14px 18px;
      margin-bottom: 12px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      background: #fff;
      outline: none;
    }
    
    input::placeholder {
      color: #999;
    }
    
    input:focus {
      box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.5);
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: #6A5ACD;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.2s;
    }
    
    button:hover {
      background: #5A4ABD;
      transform: scale(1.02);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .error {
      color: #fff;
      background: rgba(255, 0, 0, 0.2);
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1 class="logo">LS Academy</h1>
    <p class="tagline">Belajar Tanpa Batas</p>
    
    <form id="loginForm">
      <input type="email" id="email" placeholder="EMAIL" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" id="btnLogin">LOGIN</button>
      <div class="error" id="errorMsg"></div>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
    
    const supabaseUrl = 'https://rdziigwttjhnrmiutxbp.supabase.co'
    const supabaseKey = 'sb_publishable_YOV4qY3s5M7W4u9vCcApnQ_-mdd6xXA'
    const supabase = createClient(supabaseUrl, supabaseKey)

    // Kalau udah login, langsung ke beranda
    const { data: { user } = await supabase.auth.getUser()
    if (user) {
      window.location.replace("beranda.html")
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const btn = document.getElementById('btnLogin')
      const errorMsg = document.getElementById('errorMsg')
      
      btn.disabled = true
      btn.textContent = 'Loading...'
      errorMsg.style.display = 'none'
      
      const { error } = await supabase.auth.signInWithPassword({ email, password })
      
      if (error) {
        errorMsg.textContent = 'Email atau password salah!'
        errorMsg.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'LOGIN'
      } else {
        window.location.replace("beranda.html")
      }
    })
  </script>
</body>
</html>
