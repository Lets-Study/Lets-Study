<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LS Academy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: white;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
    }
    .splash-logo {
      width: 200px;
      height: auto;
      animation: fadeIn 1s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .loading-text {
      margin-top: 20px;
      color: #004AAD;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <img src="icon-192.png" alt="Let's Study" class="splash-logo">
  <div class="loading-text">Memuat...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAT4N5L04XLIktGq5mYvEqv7SiDE6uPS08",
      authDomain: "ls-academy-27d8c.firebaseapp.com",
      projectId: "ls-academy-27d8c",
      storageBucket: "ls-academy-27d8c.firebasestorage.app",
      messagingSenderId: "188990388320",
      appId: "1:188990388320:web:96a2c34af41c8b1632ab05"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // KASIH DELAY 2 DETIK BIAR LOGO KEBACA DULU
    setTimeout(() => {
      onAuthStateChanged(auth, (user) => {
        if (user) {
          window.location.replace("beranda.html");
        } else {
          window.location.replace("login.html");
        }
      });
    }, 2000);
  </script>
</body>
</html>
