<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LS Academy</title>
  <style>
    body {
      background: #0099FF;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      margin: 0;
    }
    .logo-text {
      color: #FFD700;
      font-size: 32px;
      font-weight: 700;
    }
  </style>
  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="logo-text">LS Academy</div>

  <script>
    const supabase = window.supabase.createClient(
      "https://rdziigwttjhnrmiutxbp.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkemlpZ3d0dGpobnJtaXV0eGJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwNjk3NTksImV4cCI6MjA3MjY0NTc1OX0.gpwUGW6qhoLX3qdnPzKtRAHZ9NYU-8VKn0pCVijNIP0"
    );

    // Fallback 2 detik: kalau Supabase lemot, langsung ke login
    let redirected = false;
    const go = (url) => {
      if (!redirected) {
        redirected = true;
        window.location.replace(url);
      }
    };
    setTimeout(() => go("login.html"), 2000);

    // Cek session beneran valid atau nggak
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        go("beranda.html");
      } else {
        // Hapus token lama yang rusak
        localStorage.clear();
        go("login.html");
      }
    }).catch(() => {
      // Kalau error, anggap belum login
      localStorage.clear();
      go("login.html");
    });
  </script>
</body>
</html>
