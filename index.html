<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Study</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e40af">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #004AAD;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .logo { width: 150px; margin-top: 50px; }
        h1 { color: #FFC107; }
        .button {
            background-color: #FFC107;
            color: #004AAD;
            border: none;
            padding: 12px 24px;
            margin: 10px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        .button-kedua {
            background-color: transparent;
            border: 2px solid #FFC107;
            color: #FFC107;
        }
    #splash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}
#splash img {
    width: 200px;
    animation: kedip 2s infinite;
}
@keyframes kedip {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; }
}
/* Halaman login kita sembunyiin dulu*/
#halaman-login {
    display: none;
}
.kotak-login {
    background: white;
    padding: 30px 25px;
    border-radius: 15px;
    color: #2c3e50;
    max-width: 350px;
    width: 90%;
    margin: 50px auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.kotak-login input {
    width: 100%;
    padding: 12px;
    margin: 8px0;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-sizing: border-box;
}
    </style>
</head>
<body>
<!-- 1. SPLASH KAPIBARA KEDIP -->
<div id="splash">
    <img src="icon-192.png" alt="Maskot Let's Study" class="logo">
</div>

<!-- 2. HALAMAN LOGIN EMAIL - MUNCUL SETELAH SPLASH HILANG -->
<div id="halaman-login">
    <div class="kotak-login">
        <img src="icon-192.png" alt="LS" width="80" class="mb-3">
        <h2 class="fw-bold">Login Email</h2>
        <input type="email" placeholder="Email kamu" id="email">
        <input type="password" placeholder="Password" id="password">
        <button class="button style="width:100%; box-sizing:border-box; margin-top:10px;" onclick="alert('Fitur login nyusul ya sir 😭')">Masuk</button>
        <p class="mt-3 mb-0">Belum punya akun? <a href="/daftar" style="color:#004AAD; font-weight:bold;">Daftar Gratis</a></p>
    </div>
</div>

<script>
    // Abis 2.5 detik, splash hilang + munculin halaman login
    setTimeout(function(){
        document.getElementById('splash').style.display = 'none';
        document.getElementById('halaman-login').style.display = 'block';
    }, 2500);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => console.log('Satpam Let's Study aktif:', reg))
      .catch(err => console.log('Satpam error:', err));
  });
}
</script>
</body>
</html>
