<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LS Academy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: white;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
    }
    .splash-logo {
      width: 200px;
      height: auto;
      animation: fadeIn 1s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .loading-text {
      margin-top: 20px;
      color: #004AAD;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <img src="icon-192.png" alt="LS Academy" class="splash-logo">
  <div class="loading-text">Memuat...</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  const supabaseUrl = 'https://rdziigwttjhnrmiutxbp.supabase.co'
  const supabaseKey = 'sb_publishable_YOV4qY3s5M7W4u9vCcApnQ_-mdd6xXA'
  const supabase = createClient(supabaseUrl, supabaseKey)

  setTimeout(async () => {
    const { data: { user } } = await supabase.auth.getUser()
    if (user) {
      window.location.replace("beranda.html")
    } else {
      window.location.replace("login.html")
    }
  }, 2000)
</script>
</body>
</html>
