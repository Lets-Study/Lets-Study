<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berita - LS Academy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background: #f0f4f8; font-family: 'Segoe UI', Arial, sans-serif; }
    .berita-card {
      border: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border-radius: 14px;
      margin-bottom: 15px;
    }
    .navbar { background: #0099FF; }
  </style>
</head>
<body>
  <nav class="navbar p-3">
    <div class="container-fluid">
      <span class="navbar-brand text-white fw-bold">
        <i class="bi bi-arrow-left" onclick="window.location.href='beranda.html'" style="cursor:pointer"></i>
        <span class="ms-2">Berita</span>
      </span>
    </div>
  </nav>

  <div class="container mt-3">
    <h5 class="fw-bold" style="color:#0099FF;">📰 Berita Pengetahuan Hari Ini</h5>
    <div class="mb-3">
      <button class="btn btn-sm me-2 mb-2" id="btn-all" style="background:#0099FF; color:white;" onclick="loadBerita('all', this)">Semua</button>
      <button class="btn btn-sm btn-outline-primary me-2 mb-2" onclick="loadBerita('sains', this)">Sains</button>
      <button class="btn btn-sm btn-outline-primary me-2 mb-2" onclick="loadBerita('teknologi', this)">Teknologi</button>
      <button class="btn btn-sm btn-outline-primary me-2 mb-2" onclick="loadBerita('pendidikan', this)">Pendidikan</button>
      <button class="btn btn-sm btn-outline-primary me-2 mb-2" onclick="loadBerita('UTBK', this)">UTBK</button>
    </div>
    <div id="daftar-berita">
      <p class="text-center text-muted mt-4"><i class="bi bi-hourglass-split"></i> Loading berita...</p>
    </div>
  </div>

  <script>
    async function loadBerita(topik = 'all', btnEl = null) {
      const container = document.getElementById('daftar-berita');
      container.innerHTML = '<p class="text-center text-muted mt-4"><i class="bi bi-hourglass-split"></i> Loading berita...</p>';
      
      // Update tombol aktif
      document.querySelectorAll('button').forEach(btn => {
        btn.style.background = '';
        btn.style.color = '';
        btn.classList.add('btn-outline-primary');
      });
      if (btnEl) {
        btnEl.style.background = '#0099FF';
        btnEl.style.color = 'white';
        btnEl.classList.remove('btn-outline-primary');
      }

      let query = 'sains OR teknologi OR pendidikan OR UTBK OR politik';
      if (topik !== 'all') query = topik;
      
      const url = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(
        `https://news.google.com/rss/search?q=${query}&hl=id&gl=ID&ceid=ID:id`
      );

      try {
        const res = await fetch(url);
        const data = await res.json();
        container.innerHTML = '';
        
        if (!data.items || data.items.length === 0) {
          container.innerHTML = '<p class="text-center text-muted mt-4">Berita tidak ditemukan.</p>';
          return;
        }
        
        data.items.slice(0, 10).forEach(berita => {
          container.innerHTML += `
            <div class="card berita-card">
              <div class="card-body">
                <h6 class="card-title fw-bold mb-2">${berita.title}</h6>
                <p class="text-muted small mb-3"><i class="bi bi-calendar3"></i> ${new Date(berita.pubDate).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}</p>
                <a href="${berita.link}" target="_blank" class="btn btn-sm" style="background:#0099FF; color:white;">Baca Selengkapnya</a>
              </div>
            </div>
          `;
        });
      } catch (err) {
        container.innerHTML = '<p class="text-danger text-center mt-4">Gagal load berita. Cek koneksi internet.</p>';
      }
    }

    // Load berita pertama kali
    loadBerita('all', document.getElementById('btn-all'));
  </script>
</body>
</html>
