<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LS Academy</title>
  <style>
    body {
      background: #0099FF;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      margin: 0;
    }
    .logo-text {
      color: #FFD700;
      font-size: 32px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="logo-text">LS Academy</div>

  <script>
    // Max 1.5 detik, langsung redirect
    let done = false;
    const go = (url) => {
      if (!done) {
        done = true;
        window.location.replace(url);
      }
    };

    setTimeout(() => go("login.html"), 1500);

    // Cek session dari localStorage dulu - instant
    const session = localStorage.getItem('sb-rdziigwttjhnrmiutxbp-auth-token');
    if (session) {
      go("beranda.html");
    } else {
      go("login.html");
    }
  </script>
</body>
</html>
